<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authentication Successful</title>
    <style>
      body {
        background-color: #121212;
        color: #ffffff;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .container {
        text-align: center;
        padding: 40px;
        background: #1e1e1e;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      }
      h1 {
        color: #fc4eb8;
        margin-bottom: 16px;
      }
      p {
        font-size: 18px;
        color: #cccccc;
      }
      .titlebar {
        height: 40px;
        background: #2b3035;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        app-region: drag;
        position: fixed;
        top: 0;
        width: 100%;
        z-index: 10000000000; /* Ensure it's on top of other elements */
        font-family: Arial, serif;
      }
    </style>
  </head>
  <body>
    <div class="titlebar"></div>
    <div class="container">
      <h1>Authentication Successful!</h1>
      <p>Your session has been captured. You can close this window.</p>
    </div>
  </body>
</html>
